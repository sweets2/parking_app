<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hoboken Parking</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <div id="map"></div>

  <!-- Query bar (idle state) -->
  <div id="query-bar">
    <input id="query-input" type="text" autocomplete="off" autocorrect="off"
           spellcheck="false" placeholder="Where should I park? (e.g. 'overnight')"
           aria-label="Parking query" />
    <button id="query-mic-btn" type="button" aria-label="Speak query" title="Speak query" hidden>
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" x2="12" y1="19" y2="22"/>
      </svg>
    </button>
    <button id="query-submit-btn" type="button" aria-label="Search">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.3-4.3"/>
      </svg>
    </button>
  </div>

  <!-- Query active bar (query in progress) -->
  <div id="query-active-bar" hidden>
    <span id="query-active-label"></span>
    <button id="query-clear-btn" type="button" aria-label="Clear query">&#xD7;</button>
  </div>

  <div id="banner" hidden></div>
  <div id="sign-list"></div>

  <!-- Locate button -->
  <div id="locate-control">
    <button id="locate-btn" type="button" aria-label="Get my current location" title="Get my current location">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="9" cy="9" r="5.5" stroke="currentColor" stroke-width="1.8"/>
        <line x1="9" y1="1" x2="9" y2="5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="9" y1="13" x2="9" y2="17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="1" y1="9" x2="5" y2="9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="13" y1="9" x2="17" y2="9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Legend stack (top-left overlay) -->
  <div id="legend-stack">
    <div id="tow-legend">
      <button id="tow-toggle" type="button" class="legend-btn active" title="Tow zones">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="22" height="22" class="tow-sign-icon" aria-hidden="true">
          <circle cx="10" cy="10" r="10" fill="#cc0000"/>
          <text x="10" y="15" text-anchor="middle" font-size="13" font-weight="900" fill="white" font-family="Arial Black,Impact,sans-serif">!</text>
        </svg>
      </button>
    </div>
    <div id="upcoming-legend">
      <button id="upcoming-toggle" type="button" class="legend-btn active" title="Upcoming tow zones">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="22" height="22" class="upcoming-sign-icon" aria-hidden="true">
          <circle cx="10" cy="10" r="10" fill="#f97316"/>
          <text x="10" y="15" text-anchor="middle" font-size="13" font-weight="900" fill="white" font-family="Arial Black,Impact,sans-serif">!</text>
        </svg>
      </button>
    </div>
    <div id="violation-legend">
      <button id="violation-toggle" type="button" class="legend-btn active" title="Street cleaning">
        <svg class="violation-road-icon" width="28" height="11" viewBox="0 0 30 12" aria-hidden="true">
          <rect class="violation-road-casing" width="30" height="12" rx="2" fill="#9ca3af"/>
          <rect class="violation-road-white" x="1.5" y="2.5" width="27" height="7" rx="1" fill="white"/>
          <rect class="violation-road-fill" x="1.5" y="2.5" width="27" height="7" rx="1" fill="#ef4444" fill-opacity="0.28"/>
        </svg>
      </button>
    </div>
    <div id="garage-legend">
      <button id="garage-toggle" type="button" class="legend-btn active" title="Municipal garages">
        <span class="garage-pin">&#x1F17F;</span>
      </button>
    </div>
    <div id="snow-legend">
      <button id="snow-toggle" type="button" class="legend-btn active" title="Snow emergency routes">
        <svg width="28" height="11" viewBox="0 0 30 12" class="snow-road-icon" aria-hidden="true">
          <rect width="30" height="12" rx="2" fill="#9ca3af"/>
          <rect x="1.5" y="2.5" width="27" height="7" rx="1" fill="white"/>
          <rect x="1.5" y="2.5" width="27" height="7" rx="1" fill="#3b82f6" fill-opacity="0.60"/>
        </svg>
      </button>
    </div>
    <div id="check-legend" style="display:none">
      <div class="check-legend-item">
        <span class="check-legend-swatch check-legend-safe"></span>
        <span class="check-legend-label">Safe</span>
      </div>
      <div class="check-legend-item">
        <span class="check-legend-swatch check-legend-cleaning"></span>
        <span class="check-legend-label">Street cleaning</span>
      </div>
      <div class="check-legend-item">
        <span class="check-legend-swatch check-legend-tow"></span>
        <span class="check-legend-label">Tow zone</span>
      </div>
    </div>
  </div>

  <!-- Left panel: mode nav + controls + bottom sheet (desktop sidebar) -->
  <div id="left-panel">
    <!-- Mode navigation -->
    <nav id="mode-nav" aria-label="App mode">
      <button type="button" class="mode-nav-btn mode-nav-btn--active" data-mode="check">Check</button>
      <button type="button" class="mode-nav-btn" data-mode="current">Current</button>
    </nav>

    <!-- Check controls panel -->
    <div id="check-controls" aria-label="Check parking controls">
      <input
        id="check-query-input"
        type="text"
        placeholder="e.g. 30 min, 1 hour, until 6pm"
        autocomplete="off"
      />
      <div id="check-duration-buttons">
        <button id="check-duration-30" type="button">30 min</button>
        <button id="check-duration-60" type="button">1 hour</button>
        <button id="check-duration-120" type="button">2 hours</button>
      </div>
      <div id="check-until-row">
        <label for="check-until-input">Until</label>
        <input id="check-until-input" type="time" />
      </div>
      <button id="check-run-button" type="button">Check parking</button>
    </div>

    <!-- Current controls panel -->
    <div id="current-controls" aria-label="Rules inspection controls" style="display:none">
      <div id="rules-time-row">
        <button id="rules-time-now" type="button" aria-pressed="true">Now</button>
        <button id="rules-time-custom" type="button" aria-pressed="false">Custom time</button>
        <input id="rules-time-input" type="time" aria-label="Custom inspection time" />
      </div>
      <div id="rules-layer-panel" aria-label="Rules layer options"></div>
    </div>

    <!-- Bottom sheet shell -->
    <div id="bottom-sheet" class="bottom-sheet" role="dialog" aria-modal="false" aria-label="Details">
      <div id="bottom-sheet-header">
        <button id="bottom-sheet-close" type="button" aria-label="Close details">&#x2715;</button>
      </div>
      <div id="bottom-sheet-content"></div>
    </div>
  </div>

  <!-- Bottom controls bar -->
  <div id="controls">
    <button id="here-btn" type="button" style="display:none">I Parked Here</button>
    <button id="clear-btn" type="button" style="display:none">Clear Spot</button>
  </div>

  <!-- Coffee button -->
  <button id="coffee-btn" type="button" aria-label="Buy me a coffee" title="Buy me a coffee">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M17 8h1a4 4 0 1 1 0 8h-1"/>
      <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/>
      <line x1="6" x2="6" y1="2" y2="4"/>
      <line x1="10" x2="10" y1="2" y2="4"/>
      <line x1="14" x2="14" y1="2" y2="4"/>
    </svg>
  </button>
  <div id="coffee-popover" hidden>
    <p class="coffee-msg">Enjoying the app? Help keep the lights on.</p>
    <a id="coffee-link"
       href="https://ko-fi.com/neighborhooddev"
       target="_blank"
       rel="noopener noreferrer">&#x2615; Buy me a coffee</a>
  </div>

  <!-- Feedback button and modal -->
  <button id="feedback-btn" type="button" aria-label="Send feedback" title="Send feedback">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect width="20" height="16" x="2" y="4" rx="2"/>
      <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
    </svg>
  </button>
  <div id="feedback-overlay" hidden>
    <div id="feedback-modal" role="dialog" aria-modal="true" aria-labelledby="feedback-title">
      <h2 id="feedback-title">Send Feedback</h2>
      <p class="feedback-subtitle">Bugs, feature requests, or general comments welcome!</p>
      <form id="feedback-form">
        <textarea id="feedback-text" placeholder="Type your feedback here..." rows="5"></textarea>
        <div class="feedback-actions">
          <button id="feedback-cancel" type="button">Cancel</button>
          <button id="feedback-submit" type="submit">Submit</button>
        </div>
      </form>
      <button id="feedback-close-btn" type="button" aria-label="Close feedback">&#x2715;</button>
      <p id="feedback-confirm" hidden aria-live="polite"></p>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
