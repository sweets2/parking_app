<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hoboken Parking</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="map"></div>
    <div id="banner"></div>
    <div id="sign-list"></div>
    <div id="tow-legend">
      <button id="tow-toggle" aria-pressed="true" title="Show or hide tow zone markers">
        <span class="tow-dot"></span>
        <span class="tow-label">
          <span class="tow-title">Tow Zones</span>
          <span class="tow-status">Enabled</span>
        </span>
      </button>
    </div>
    <div id="controls">
      <button id="here-btn">I'm Here Now</button>
      <button id="clear-btn">Clear My Spot</button>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
